name: vapestore_flutter
description: VapeStore App - Flutter rewrite with Premium Dark theme
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  go_router: ^13.0.0
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.0
  file_picker: ^6.1.0
  mobile_scanner: ^4.0.0
  permission_handler: ^11.0.0
  shared_preferences: ^2.2.0
  intl: ^0.19.0
  fl_chart: ^0.66.0
  share_plus: ^7.2.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
